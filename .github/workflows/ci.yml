name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  build:
    name: Cross-compile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # A representative subset (3 OSes, amd64 + arm64) for fast push/PR feedback —
      # enough to catch OS/arch-specific compile breakage. Release day cross-compiles
      # every target via goreleaser, so full platform coverage isn't lost.
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: go build -trimpath -ldflags "-s -w" -o /dev/null ./cmd/geiger
