name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Heavy goreleaser builds only run on a clean version rev: the full check gate
  # (tidy + gofmt + vet + race tests, lint, govulncheck) must pass first.
  checks:
    uses: ./.github/workflows/checks.yml

  goreleaser:
    name: GoReleaser
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can be built
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
